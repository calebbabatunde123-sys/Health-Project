<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HelixCare - Medical Registration</title>

  <!-- CSS -->
  <link rel="stylesheet" href="/CSS/Med reg.css" />

  <!-- Font Awesome -->
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
  />
</head>

<body>
  <!-- Progress Bar -->
<div class="progress-bar">
  <div class="progress-fill" id="progressFill"></div>
</div>
  <div class="main-container">
    <div class="auth-container">

      <!-- Header -->
      <div class="form-header">
        <h2>Medical Profile</h2>
        <p>Please fill in your medical details</p>
      </div>

      <!-- FORM START -->
      <form class="form" id="medFormElement" novalidate>

        <!-- Date of Birth -->
        <div class="form-group">
          <label for="dateOfBirth">Date of Birth</label>
          <input
            type="date"
            id="dateOfBirth"
            name="dateOfBirth"
            required
          />
        </div>

        <!-- Gender -->
        <div class="form-group">
          <label>Gender</label>
          <div class="radio-group">
            <label for="male">
              <input type="radio" id="male" name="gender" value="male" required />
              Male
            </label>

            <label for="female">
              <input type="radio" id="female" name="gender" value="female" />
              Female
            </label>
          </div>
        </div>

        <!-- Blood Group -->
        <div class="form-group">
          <label for="blood">Blood Group</label>
          <select id="blood" name="blood" required>
            <option value="">Select Blood Group</option>
            <option value="A+">A+</option>
            <option value="A-">A-</option>
            <option value="B+">B+</option>
            <option value="B-">B-</option>
            <option value="AB+">AB+</option>
            <option value="AB-">AB-</option>
            <option value="O+">O+</option>
            <option value="O-">O-</option>
          </select>
        </div>

        <!-- Emergency Contact Name -->
        <div class="form-group input-icon">
          <i class="fas fa-user"></i>
          <input type="text" required />
          <label>Emergency Contact Name</label>
        </div>

        <!-- Relationship -->
        <div class="form-group">
          <label for="relationship">Relationship</label>
          <select id="relationship" name="relationship" required>
            <option value="">Select</option>
            <option value="parent">Parent</option>
            <option value="spouse">Spouse</option>
            <option value="sibling">Sibling</option>
            <option value="friend">Friend</option>
            <option value="guardian">Guardian</option>
            <option value="other">Other</option>
          </select>
        </div>

        <!-- Emergency Phone -->
        <div class="form-group">
          <label for="emergencyPhone">Emergency Phone Number</label>
          <input
            type="tel"
            id="emergencyPhone"
            name="emergencyPhone"
            placeholder="+234..."
            required
          />
        </div>

        <!-- Submit Button -->
        <button type="submit" class="submit-btn" id="signupSubmitBtn">
          <span class="btn-text">Create Account</span>
          <span class="btn-loader hidden">
            <i class="fas fa-spinner fa-spin"></i>
          </span>
        </button>

      </form>
      <!-- FORM END -->

    </div>
  </div>

  <!-- Success Modal -->
  <div id="successModal" class="modal hidden">
    <div class="modal-content">

      <div class="modal-header">
        <i class="fas fa-check-circle success-icon"></i>
        <h2 id="modalTitle">Welcome to HelixCare!</h2>
      </div>

      <div class="modal-body">
        <p id="modalMessage">
          Your account has been created successfully. You can now start
          connecting with doctors worldwide.
        </p>
      </div>

      <div class="modal-footer">
        <button class="modal-btn primary" id="modalPrimaryBtn">
          Get Started
        </button>
        <button class="modal-btn secondary" id="modalSecondaryBtn">
          Close
        </button>
      </div>

    </div>
  </div>

  <!-- Toast Container -->
  <div id="toastContainer" class="toast-container"></div>

  <!-- JS -->
  <script src="/JS/Med.js"></script>

</body>
</html>
